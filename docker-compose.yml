services:
  mysql:
    image: mysql:8.0
    container_name: reservation-mysql
    restart: unless-stopped

    ports:
      - "${MYSQL_PORT}:3306"

    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    container_name: reservation-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:${REDIS_CONTAINER_PORT}"
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--user", "${REDIS_USERNAME}", "on", ">${REDIS_PASSWORD}", "~*", "+@all",
        "--user", "default", "off"
      ]
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: